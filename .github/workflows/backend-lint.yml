name: Backend - Lint

env:
  GO_VERSION: "1.25.11"

on:
  pull_request:
    paths:
      - backend/**
      - .github/workflows/backend-lint.yml
  push:
    branches: [ main ]
    paths:
      - backend/**
      - .github/workflows/backend-lint.yml

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        run: go mod download

      - name: Run go fmt check
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "The following files are not formatted:"
            gofmt -l .
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: go list ./... | grep -v /gen/ | xargs staticcheck -f stylish

      - name: Run govulncheck
        id: govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: ${{ env.GO_VERSION }}
          check-latest: false
          cache: false
          work-dir: backend
          go-package: ./...
          output-format: text

      - name: Summary
        if: success()
        run: |
          echo "## ✅ All Lint Checks Passed" >> $GITHUB_STEP_SUMMARY
          echo "- go fmt: Passed" >> $GITHUB_STEP_SUMMARY
          echo "- go vet: Passed" >> $GITHUB_STEP_SUMMARY
          echo "- staticcheck: Passed" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.govulncheck.outcome }}" = "success" ]; then
            echo "- govulncheck: Passed" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.govulncheck.outcome }}" = "failure" ]; then
            echo "- govulncheck: Found vulnerabilities" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Ready to merge!" >> $GITHUB_STEP_SUMMARY
