  # === Reports API ===
  /reports/operator-yield/export:
    get:
      tags:
        - reports
      summary: Export operator yield report as CSV
      description: |
        Exports per-operator, per-task daily yield report as a UTF-8 CSV file.

        One row per (date × operator × task). Columns include working window,
        non-working / discarded / collected minutes, EP count and yield ratio.

        NOTE: Cleansing-related filtering is not yet implemented. As a result,
        "discarded data" only includes Cancel episodes (not cleansed-out data),
        and "collected data" includes all Completed episodes (no quality filter).
        Working time and non-working time are unaffected by cleansing.

        Maximum 30,000 rows. If exceeded, a 400 error is returned — apply filters to reduce the result set.
      operationId: exportOperatorYield
      parameters:
        - name: date_from
          in: query
          description: Inclusive lower bound of the working date (JST, ISO 8601 date, e.g. 2026-04-01).
          required: true
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          description: Inclusive upper bound of the working date (JST, ISO 8601 date, e.g. 2026-04-30).
          required: true
          schema:
            type: string
            format: date
        - name: location_id
          in: query
          description: Filter by location ID
          required: false
          schema:
            type: string
        - name: task_id
          in: query
          description: Filter by task ID
          required: false
          schema:
            type: string
        - name: user_id
          in: query
          description: Filter by operator user ID (matches recorded_by, falling back to user_id)
          required: false
          schema:
            type: string
      responses:
        "200":
          description: CSV file containing operator yield rows
          content:
            text/csv:
              schema:
                type: string
                format: binary
          headers:
            Content-Disposition:
              schema:
                type: string
              example: 'attachment; filename="operator_yield_export_20260430.csv"'
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

