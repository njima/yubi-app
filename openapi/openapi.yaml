      description: |
        Create a new API key for a robot in the caller's organization. The raw
        key is returned exactly once in the response and cannot be retrieved
        afterwards.
      operationId: createApiKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiKeyCreateRequest"
      responses:
        "201":
          description: API key created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyCreateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api-keys/{api_key_id}:
    parameters:
      - name: api_key_id
        in: path
        description: API key ID (UUID, id_natural)
        required: true
        schema:
          type: string
    get:
      tags:
        - api-keys
      summary: Get API key
      operationId: getApiKey
      responses:
        "200":
          description: API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    patch:
      tags:
        - api-keys
      summary: Update API key
      description: |
        Update name and/or expires_at on an API key. The robot_id binding is
        immutable — to change it, revoke the key and issue a new one.
      operationId: updateApiKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiKeyUpdateRequest"
      responses:
        "200":
          description: API key updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      tags:
        - api-keys
      summary: Revoke API key
      description: Soft-delete the key by setting revoked_at. Idempotent.
      operationId: revokeApiKey
      responses:
        "204":
          description: API key revoked
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"


components:
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    MethodNotAllowed:
      description: Method not allowed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotAcceptable:
      description: Not acceptable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RequestTimeout:
      description: Request timeout
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    UserRole:
      type: integer
      description: |-
        User role enum
        0: Admin
        1: Data Engineer
        2: Manager
        3: Operator
        4: Viewer
      enum:
        - 0
        - 1
        - 2
        - 3
        - 4
      x-enumNames:
        - Admin
        - DataEngineer
        - Manager
        - Operator
        - Viewer
    RobotStatus:
      type: integer
      description: |-
        0: Online
        1: Busy
        2: Offline
        3: Faulted
        4: Maintenance
        5: Ready
      enum:
        - 0
        - 1
        - 2
        - 3
        - 4
        - 5
      x-enumNames:
        - Online
        - Busy
        - Offline
        - Faulted
        - Maintenance
        - Ready

    LeaderStatus:
      type: integer
      description: |-
        0: Ready
        1: Faulted
        2: Maintenance
      enum:
        - 0
        - 1
        - 2
      x-enumNames:
        - LeaderReady
        - LeaderFaulted
        - LeaderMaintenance
        - Ready
    SubTaskStatus:
      type: integer
      description: |-
        0: Ready - Subtask is ready to start
        1: InProgress - Subtask is currently being executed
        2: Failed - Subtask execution failed
        3: Completed - Subtask was completed successfully
      enum:
        - 0
        - 1
        - 2
        - 3
      x-enumNames:
        - Ready
        - InProgress
        - Failed
        - Completed
    ApprovalStatus:
      type: integer
      description: |-
        0: Draft - Version is in draft state, editable
        1: Approved - Version is approved, locked for data collection
      enum:
        - 0
        - 1
      x-enumNames:
        - Draft
        - Approved
    TaskPriority:
      type: integer
      description: |-
        0: Low
        1: Normal
        2: High
        3: Urgent
      enum:
        - 0
        - 1
        - 2
        - 3
      x-enumNames:
        - TaskPriorityLow
        - TaskPriorityNormal
        - TaskPriorityHigh
        - TaskPriorityUrgent
    TaskDifficulty:
      type: integer
      description: |-
        0: S
        1: A
        2: B
        3: C
      enum:
        - 0
        - 1
        - 2
        - 3
      x-enumNames:
        - DifficultyS
        - DifficultyA
        - DifficultyB
        - DifficultyC
    TaskStatus:
      type: integer
      description: |-
        0: Planning
        1: Doing
        2: Completed
        3: Canceled
      enum:
        - 0
        - 1
        - 2
        - 3
      x-enumNames:
        - TaskStatusPlanning
        - TaskStatusDoing
        - TaskStatusCompleted
        - TaskStatusCanceled
    EpisodeCollectionStatus:
      type: integer
      description: |-
        0: Ready - Episode is ready to start data collection
        1: Recording - Episode is currently being recorded
        2: Cancel - Episode data collection was cancelled
        3: Completed - Episode data collection was completed successfully
      enum:
        - 0
        - 1
        - 2
        - 3
      x-enumNames:
        - Ready
        - Recording
        - Cancel
        - Completed
    EpisodeTaskResult:
      type: integer
      description: |-
        0: Undetermined - Task result is not yet determined
        1: Success - All subtasks succeeded
        2: Failed - One or more subtasks failed
      enum:
        - 0
        - 1
        - 2
      x-enumNames:
        - Undetermined
        - Success
        - Failed
    EpisodeUploadStatus:
      type: integer
      description: |-
        0: Ready - Ready to upload
        1: Uploading - Data upload in progress
        2: Failed - Data upload failed
        3: Completed - Data upload completed
      enum:
        - 0
        - 1
        - 2
        - 3
      x-enumNames:
        - Ready
        - Uploading
        - Failed
        - Completed
    SubTaskCollectionStatus:
      type: integer
      description: |-
        0: Ready - Subtask is ready to start
        1: InProgress - Subtask is in progress
        2: Completed - Subtask data collection completed
        3: Skipped - Subtask was skipped
        4: Cancelled - Subtask was cancelled
      enum:
        - 0
        - 1
        - 2
        - 3
        - 4
      x-enumNames:
        - SubTaskCollectionStatusReady
        - SubTaskCollectionStatusInProgress
        - SubTaskCollectionStatusCompleted
        - SubTaskCollectionStatusSkipped
        - SubTaskCollectionStatusCancelled
    SubTaskTaskResult:
      type: integer
      description: |-
        0: Undetermined - Task result is not yet determined
        1: Success - Subtask execution was successful
        2: Failed - Subtask execution failed
      enum:
        - 0
        - 1
        - 2
      x-enumNames:
        - SubTaskTaskResultUndetermined
        - SubTaskTaskResultSuccess
        - SubTaskTaskResultFailed
    ExecutionStatus:
      type: integer
      description: |-
        0: Ready - Execution is ready to start
        1: Started - Execution has started
        2: Cancelled - Execution was cancelled
        3: Finished - Execution has finished
      enum:
        - 0
        - 1
        - 2
        - 3
      x-enumNames:
        - Ready
        - Started
        - Cancelled
        - Finished
    EpisodeActionRequest:
      type: object
      description: Request body for episode actions (start, finish, cancel)
      properties:
        occurred_at:
          type: string
          format: date-time
          description: Timestamp when the action occurred
      required:
        - occurred_at
    ExecutionActionRequest:
      type: object
      description: Request body for execution actions (start, finish, cancel)
      properties:
        occurred_at:
          type: string
          format: date-time
          description: Timestamp when the action occurred
      required:
        - occurred_at
    SubTaskActionRequest:
      type: object
      description: Request body for subtask actions (complete, skip)
      properties:
        occurred_at:
          type: string
          format: date-time
          description: Timestamp when the action occurred
      required:
        - occurred_at
    ExecutionCreateResponse:
      type: object
      description: Response for execution creation
      properties:
        execution_id:
          type: string
          description: Created execution ID
      required:
        - execution_id
    # === User schemas ===
    LocationSummary:
      type: object
      properties:
        location_id:
          type: string
          description: Location ID
        name:
          type: string
          description: Location name
      required:
        - location_id
        - name
    SiteSummary:
      type: object
      properties:
        site_id:
          type: string
          description: Site ID
        name:
          type: string
          description: Site name
      required:
        - site_id
        - name
    UserResponse:
      type: object
      properties:
        user_id:
          type: string
          description: User ID
        email:
          type: string
          description: Email address
        display_name:
          type: string
          description: Display name
        role:
          $ref: "#/components/schemas/UserRole"
        created_at:
          type: string
          format: date-time
          description: Created at
        organization_id:
          type: string
          description: Organization ID
        organization_name:
          type: string
          description: Organization display name
        updated_at:
          type: string
          format: date-time
          description: Updated at
        locations:
          type: array
          items:
            $ref: "#/components/schemas/LocationSummary"
          description: Assigned locations
        sites:
          type: array
          items:
            $ref: "#/components/schemas/SiteSummary"
          description: Assigned sites
      required:
        - user_id
        - email
        - display_name
        - organization_id
        - organization_name
        - created_at
        - locations
        - sites
    MeResponse:
      type: object
      properties:
        user_id:
          type: string
          description: User ID
        email:
          type: string
          description: Email address
        display_name:
          type: string
          description: Display name
        avatar_url:
          type: string
          nullable: true
          description: Avatar URL
        active_organization_id:
          type: string
          description: Active organization ID
        active_organization_name:
          type: string
          description: Active organization display name
        active_role:
          $ref: "#/components/schemas/UserRole"
      required:
        - user_id
        - email
        - display_name
        - active_organization_id
        - active_organization_name
        - active_role
    UserListResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/UserResponse"
        pagination:
          $ref: "#/components/schemas/Pagination"
        filter:
          $ref: "#/components/schemas/UserFilter"
      required:
        - users
        - pagination
        - filter
    UserCreateRequest:
      type: object
      properties:
        email:
          type: string
          description: Email address
        display_name:
          type: string
          description: Display name
        role:
          $ref: "#/components/schemas/UserRole"
        location_ids:
          type: array
          items:
            type: string
          description: Location IDs to assign
        site_ids:
          type: array
          items:
            type: string
          description: Site IDs to assign
      required:
        - email
        - display_name
        - role
    UserUpdateRequest:
      type: object
      properties:
        email:
          type: string
          description: Email address
        display_name:
          type: string
          description: Display name
    MeUpdateRequest:
      type: object
      description: |
        Fields that an authenticated user is allowed to change on their own
        profile. Restricted on purpose to a strict subset of UserUpdateRequest.
      required:
        - display_name
      properties:
        display_name:
          type: string
          minLength: 1
          maxLength: 60
          description: Display name
    UserLocationsUpdateRequest:
      type: object
      required:
        - location_ids
      properties:
        location_ids:
          type: array
          items:
            type: string
          description: Location IDs to assign
    UserSitesUpdateRequest:
      type: object
      required:
        - site_ids
      properties:
        site_ids:
          type: array
          items:
            type: string
          description: Site IDs to assign
    UserRoleUpdateRequest:
      type: object
      properties:
        role:
          $ref: "#/components/schemas/UserRole"
      required:
        - role
    UserFilter:
      type: object
      properties:
        organization_id:
          type: string
          description: Organization ID filter
        location_id:
          type: string
          description: Location ID filter
        site_id:
          type: string
          description: Site ID filter
    Pagination:
      type: object
      properties:
        count:
          type: integer
          description: Total count
        page:
          type: integer
          description: Current page number
        limit:
          type: integer
          description: Items per page
      required:
        - count
        - page
        - limit
    ApiKeyResponse:
      type: object
      properties:
        id:
          type: string
          description: API key ID (UUID)
        name:
          type: string
        user_id:
          type: string
          description: Owner user ID
        user_name:
          type: string
          description: Resolved owner user name (denormalized for UI display)
        robot_id:
          type: string
          nullable: true
          description: Bound robot ID (currently always set on issue)
        robot_name:
          type: string
          nullable: true
          description: Resolved bound robot name (denormalized for UI display). Null when robot_id is null.
        organization_id:
          type: string
        key_hint:
          type: string
          description: Short hint shown in UI (first 4 + ... + last 4)
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Expiration timestamp, null means no expiry
        last_used_at:
          type: string
          format: date-time
          nullable: true
        revoked_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - name
        - user_id
        - user_name
        - organization_id
        - key_hint
        - created_at
        - updated_at
    ApiKeyCreateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        robot_id:
          type: string
          description: Robot ID to bind this key to
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Optional expiration. Omit or null for no expiry.
      required:
        - name
        - robot_id
    ApiKeyCreateResponse:
      allOf:
        - $ref: "#/components/schemas/ApiKeyResponse"
        - type: object
          properties:
            key:
              type: string
              description: Raw API key. Returned only once at creation time — store it securely.
          required:
            - key
    ApiKeyUpdateRequest:
      type: object
      description: |
        Partial update. Provide only the fields to change. To clear the
        expiration, pass `expires_at: null` together with `clear_expires_at: true`.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        expires_at:
          type: string
          format: date-time
          nullable: true
        clear_expires_at:
          type: boolean
          description: When true, expires_at is set to NULL regardless of the expires_at value.
    ApiKeyListResponse:
      type: object
      properties:
        api_keys:
          type: array
          items:
            $ref: "#/components/schemas/ApiKeyResponse"
        pagination:
