openapi: 3.1.0
info:
  title: Yubi App API
  version: 1.0.0
  description: REST API for robot teleoperation data collection and management
servers:
  - url: https://api.dev.example.com/v1
    description: dev
tags:
  - name: users
    description: Users
  - name: organizations
    description: Organizations
  - name: permissions
    description: Permissions
  - name: robots
    description: Robots
  - name: tasks
    description: Tasks
  - name: sub-tasks
    description: Sub-tasks
  - name: episodes
    description: Episodes
  - name: sites
    description: Sites
  - name: locations
    description: Locations
  - name: reports
    description: Reports / analytics exports
  - name: api-keys
    description: API keys for robot-side authentication
paths:
  # === User API ===
  /me:
    get:
      tags:
        - users
      summary: Get current user
      description: Retrieve the currently authenticated user's information
      operationId: getMe
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
    put:
      tags:
        - users
      summary: Update current user
      description: |
        Update the currently authenticated user's own profile.
        Available to all authenticated roles. Only fields exposed by
        `MeUpdateRequest` may be updated via this endpoint.
      operationId: updateMe
      requestBody:
        description: Self-updatable fields
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeUpdateRequest"
      responses:
        "200":
          description: Updated user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /users:
    get:
      tags:
        - users
      summary: List users
      description: Retrieve list of users
      operationId: listUsers
      parameters:
        - name: limit
          in: query
          description: Items per page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 50
        - name: page
          in: query
          description: Page number
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: organization_id
          in: query
          description: Filter by organization ID
          required: false
          schema:
            type: string
        - name: location_id
          in: query
          description: Filter by location ID
          required: false
          schema:
            type: string
        - name: site_id
          in: query
          description: Filter by site ID
          required: false
          schema:
            type: string
        - name: search
          in: query
          description: Search by display name (case-insensitive partial match)
          required: false
          schema:
            type: string
        - name: sort_by
          in: query
          description: Column to sort by
          required: false
          schema:
            type: string
            enum:
              - name
              - email
              - role
              - location
              - created_at
            x-enumNames:
              - UserSortByName
              - UserSortByEmail
              - UserSortByRole
              - UserSortByLocation
              - UserSortByCreatedAt
        - name: sort_order
          in: query
          description: Sort direction
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
            x-enumNames:
              - UserSortOrderAsc
              - UserSortOrderDesc
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags:
        - users
      summary: Create User
      description: Create User
      operationId: createUser
      requestBody:
        description: Data for the create user
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreateRequest"
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /users/{user_id}:
    parameters:
      - name: user_id
        in: path
        description: User ID
        required: true
        schema:
          type: string
    get:
      tags:
        - users
      summary: Get user details
      description: Retrieve user details
      operationId: getUserById
      responses:
        "200":
          description: User info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    put:
      tags:
        - users
      summary: Update user
      description: Update a user
      operationId: updateUserById
      requestBody:
        description: Data for the user to update
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdateRequest"
      responses:
        "200":
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      tags:
        - users
      summary: Delete user
      operationId: deleteUserById
      responses:
        "204":
          description: User deleted successfully (no content)
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /users/{user_id}/role:
    parameters:
      - name: user_id
        in: path
        description: User ID
        required: true
        schema:
          type: string
    put:
      tags:
        - users
      summary: Update user role
      description: Update a user's role
      operationId: updateUserRole
      requestBody:
        description: Data for the user role to update
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRoleUpdateRequest"
      responses:
        "200":
          description: User role updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /users/{user_id}/locations:
    put:
      tags:
        - users
      summary: Update user locations
      description: Assign locations to a user (admin only)
      operationId: updateUserLocations
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserLocationsUpdateRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # === User Import API ===
  /users/import/validate:
    post:
      tags:
        - users
      summary: Validate CSV for user import
      description: |
        Validates a CSV string for user import. Returns a preview of valid rows,
        duplicate rows (by email), and rows with errors. Does not create users.
      operationId: validateUserImport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserImportRequest"
      responses:
        "200":
          description: Validation result with preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserImportValidationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /users/import:
    post:
      tags:
        - users
      summary: Import users from CSV
      description: |
        Imports users from a CSV string. Valid rows are processed independently;
        duplicate rows are skipped. Each valid row creates a user in the database.
      operationId: importUsers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserImportRequest"
      responses:
        "200":
          description: Import result report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserImportResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # === Organization API ===
  /organizations:
    get:
      tags:
        - organizations
      summary: List organizations
      description: Retrieve list of organizations
      operationId: listOrganizations
      parameters:
        - name: limit
          in: query
          description: Items per page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 50
        - name: page
          in: query
          description: Page number
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        "200":
          description: Organization list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationListResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags:
        - organizations
      summary: Create organization
      description: Create an organization
      operationId: createOrganization
      requestBody:
        description: Data for the organization to create
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrganizationCreateRequest"
      responses:
        "201":
          description: Organization created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /organizations/{organization_id}:
    parameters:
      - name: organization_id
        in: path
        description: Organization ID
        required: true
        schema:
          type: string
    get:
      tags:
        - organizations
      summary: Get organization details
      description: Retrieve organization details
      operationId: getOrganizationById
      responses:
        "200":
          description: Organization info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    put:
      tags:
        - organizations
      summary: Update organization
      description: Update organization information
      operationId: updateOrganizationById
      requestBody:
        description: Data for the organization to update
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrganizationUpdateRequest"
      responses:
        "200":
          description: Organization updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      tags:
        - organizations
      summary: Delete organization
      description: Delete an organization
      operationId: deleteOrganizationById
      responses:
        "204":
          description: Organization deleted successfully (no content)
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # === Permission API ===
  /users/{user_id}/permissions:
    parameters:
      - name: user_id
        in: path
        description: User ID
        required: true
        schema:
          type: string
    get:
      tags:
        - permissions
      summary: List permissions for a user
      operationId: listUserPermissions
      responses:
        "200":
          description: Permission list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Permission"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags:
        - permissions
      summary: Grant permission to a user
      operationId: grantUserPermission
      requestBody:
        description: Data of the permission to grant
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PermissionCreate"
      responses:
        "201":
          description: Permission granted successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      tags:
        - permissions
      summary: Revoke permission from a user
      operationId: revokeUserPermission
      parameters:
        - name: code
          in: query
          description: Permission code to revoke
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Permission revoked successfully (no content)
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # === Fleet API ===
  /fleet/summary:
    get:
      tags:
        - fleet
      summary: Get fleet summary
      description: Real-time robot status aggregation by site, robot type, and leader/follower
      operationId: getFleetSummary
      responses:
        "200":
          description: Fleet summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FleetSiteSummary"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /fleet/stats:
    get:
      tags:
        - fleet
      summary: Get fleet statistics
      description: Period-based data collection time statistics by site and robot type
      operationId: getFleetStats
      parameters:
        - name: from
          in: query
          description: Start of period (inclusive)
          required: true
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: End of period (exclusive)
          required: true
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Fleet statistics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FleetSiteStats"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /fleet/collection-trend:
    get:
      tags:
        - fleet
      summary: Get collection trend
      description: Time series data collection trend by site and robot type
      operationId: getFleetCollectionTrend
      parameters:
        - name: granularity
          in: query
          description: Time granularity
          required: true
          schema:
            type: string
            enum:
              - hourly
              - daily
              - monthly
        - name: from
          in: query
          description: Start of period (inclusive)
          required: true
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: End of period (exclusive)
          required: true
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Collection trend data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionTrend"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # === Robot API ===
  /robots:
    get:
      tags:
        - robots
      summary: List robots
      operationId: listRobots
      parameters:
        - name: organization_id
          in: query
          description: Filter by organization ID
          required: false
          schema:
            type: string
        - name: site_id
          in: query
          description: Filter by site ID
          required: false
          schema:
            type: string
        - name: location_id
          in: query
          description: Filter by location ID
          required: false
          schema:
            type: string
        - name: status
          in: query
          description: Filter by robot status
          required: false
          schema:
            $ref: "#/components/schemas/RobotStatus"
        - name: robot_type
          in: query
          description: Filter by robot type
          required: false
          schema:
            type: string
        - name: page
          in: query
          description: Page number (1-based)
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Items per page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 20
        - name: search
          in: query
          description: Search by name (case-insensitive partial match)
          required: false
          schema:
            type: string
        - name: sort_by
          in: query
          description: Column to sort by
          required: false
          schema:
            type: string
            enum:
              - name
              - location_id
              - robot_type
              - status
              - leader_status
              - last_heartbeat_at
              - active_episode_id
              - active_user_id
            x-enumNames:
              - RobotSortByName
              - RobotSortByLocationId
              - RobotSortByRobotType
              - RobotSortByStatus
              - RobotSortByLeaderStatus
              - RobotSortByLastHeartbeatAt
              - RobotSortByActiveEpisodeId
              - RobotSortByActiveUserId
        - name: sort_order
          in: query
          description: Sort direction
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
            x-enumNames:
              - RobotSortOrderAsc
              - RobotSortOrderDesc
      responses:
        "200":
          description: Robot list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RobotListResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags:
        - robots
      summary: Create robot
      operationId: createRobot
      requestBody:
        description: Data for the robot to create
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RobotCreate"
      responses:
        "201":
          description: Robot created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Robot"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /robot-types:
    get:
      tags:
        - robots
      summary: List distinct robot types
      operationId: listRobotTypes
      parameters:
        - name: site_id
          in: query
          schema:
            type: string
        - name: location_id
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/RobotStatus"
      responses:
        "200":
          description: Robot type name list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        "500":
          $ref: "#/components/responses/InternalServerError"
  /robots/{robotId}:
    parameters:
      - name: robotId
        in: path
        description: Robot ID
        required: true
        schema:
          type: string
    get:
      tags:
        - robots
      summary: Get robot details
      operationId: getRobotById
      responses:
        "200":
          description: Robot info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Robot"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    put:
      tags:
        - robots
      summary: Update robot
      operationId: updateRobotById
      requestBody:
        description: Data for the robot to update
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RobotUpdate"
      responses:
        "200":
          description: Robot updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Robot"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      tags:
        - robots
      summary: Delete robot
      operationId: deleteRobotById
      responses:
        "204":
          description: Robot deleted successfully (no content)
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /robots/{robotId}/operator:
    parameters:
      - name: robotId
        in: path
        description: Robot ID
        required: true
        schema:
          type: string
    get:
      tags:
        - robots
      summary: Get active operator
      description: Returns the current operator for this robot, or 204 if none.
      operationId: getRobotOperator
      responses:
        "200":
          description: Current operator
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RobotOperator"
        "204":
          description: No active operator
        "500":
          $ref: "#/components/responses/InternalServerError"
    put:
      tags:
        - robots
      summary: Set active operator (heartbeat)
      description: >-
        Register or refresh the active operator for this robot.
        Stored in Redis with a short TTL. Returns 409 if another user
        already holds the operator lock.
      operationId: setRobotOperator
      requestBody:
        description: Operator identity
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RobotOperatorRequest"
      responses:
        "200":
          description: Operator set successfully
        "409":
          description: Robot locked by another operator
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RobotOperator"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      tags:
        - robots
      summary: Clear active operator
      description: Release the operator lock for this robot.
      operationId: clearRobotOperator
      responses:
        "204":
          description: Operator cleared
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # === Task API ===
  /tasks:
    get:
      tags:
        - tasks
      summary: List tasks
      operationId: listTasks
      parameters:
        - name: has_approved_version
          in: query
          description: Filter tasks that have at least one approved version
          required: false
          schema:
            type: boolean
        - name: page
          in: query
          description: Page number (1-based)
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Items per page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 20
        - name: sort_by
          in: query
          description: Column to sort by
          required: false
          schema:
            type: string
            enum:
              - name
              - robot_type
              - priority
              - difficulty
              - target_duration_seconds
              - status
              - recommended
            x-enumNames:
              - TaskSortByName
              - TaskSortByRobotType
              - TaskSortByPriority
              - TaskSortByDifficulty
              - TaskSortByTargetDurationSeconds
              - TaskSortByStatus
              - TaskSortByRecommended
        - name: sort_order
          in: query
          description: Sort direction
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
            x-enumNames:
              - TaskSortOrderAsc
              - TaskSortOrderDesc
        - name: status
          in: query
          description: Filter by task status (multiple values allowed)
          required: false
          explode: true
          schema:
            type: array
            items:
              $ref: "#/components/schemas/TaskStatus"
        - name: priority
          in: query
          description: Filter by task priority (multiple values allowed)
          required: false
          explode: true
          schema:
            type: array
            items:
              $ref: "#/components/schemas/TaskPriority"
        - name: difficulty
          in: query
          description: Filter by task difficulty (multiple values allowed)
          required: false
          explode: true
          schema:
            type: array
            items:
              $ref: "#/components/schemas/TaskDifficulty"
        - name: robot_type
          in: query
          description: Filter by robot type
          required: false
          schema:
            type: string
        - name: search
          in: query
          description: Search by name (case-insensitive partial match)
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Task list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskListResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags:
        - tasks
      summary: Create task
