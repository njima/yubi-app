    LocationListResponse:
      type: object
      properties:
        locations:
          type: array
          items:
            $ref: "#/components/schemas/Location"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required:
        - locations
        - pagination

    # === Organization schemas ===
    OrganizationResponse:
      type: object
      properties:
        organization_id:
          type: string
          description: Organization ID
        display_name:
          type: string
          description: Display name
        description:
          type: string
          description: Description
        created_at:
          type: string
          format: date-time
          description: Created at
        updated_at:
          type: string
          format: date-time
          description: Updated at
