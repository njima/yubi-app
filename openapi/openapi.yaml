      type: object
      properties:
        display_name:
          type: string
          description: Display name
        description:
          type: string
          description: Description

    # === Permission schemas ===
    Permission:
      type: object
      properties:
        code:
          type: string
          description: "Permission code (e.g., 'task:read', 'asset:write')"
      required:
        - code
    PermissionCreate:
      type: object
      properties:
        code:
          type: string
          description: Permission code to grant
      required:
        - code
    PermissionDelete:
      type: object
      properties:
        code:
          type: string
          description: Permission code to delete
      required:
        - code

    # === Robot schemas ===
    Robot:
      type: object
      properties:
        id:
          type: string
          description: Robot ID
        organization_id:
          type: string
          description: Organization ID
        organization_name:
          type: string
          description: Organization display name
        site_id:
          type: string
          description: Site ID
        site_name:
          type: string
          description: Site display name
        location_id:
          type: string
          description: Location ID
        location_name:
          type: string
          description: Location display name
        name:
          type: string
          description: Robot name
        robot_type:
          type: string
          description: Robot type name
        status:
          $ref: "#/components/schemas/RobotStatus"
        leader_status:
          $ref: "#/components/schemas/LeaderStatus"
          nullable: true
          description: Leader component status (null if robot has no leader component)
        consecutive_fault_days:
          type: integer
          nullable: true
          description: Consecutive days since this robot entered Faulted status (null for non-Faulted)
        leader_consecutive_fault_days:
          type: integer
          nullable: true
          description: Consecutive days since leader status entered Faulted (null for non-Faulted)
        leader_fault_started_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when leader status entered Faulted (null for non-Faulted)
        battery_level:
          type: integer
          description: Battery level (0-100)
        last_heartbeat_at:
          type: string
          format: date-time
          description: Last heartbeat timestamp
        offline_reason:
          type: string
          description: Reason why robot is offline
        robot_config:
          type: object
          nullable: true
          description: Robot configuration including camera settings (JSON)
        active_episode_id:
          type: string
          description: Active Episode ID
        active_user_id:
          type: string
          description: Active User ID
        active_operator:
          $ref: "#/components/schemas/RobotOperator"
      required:
        - id
        - name
    RobotCreate:
      type: object
      properties:
        organization_id:
          type: string
          description: Organization ID
        location_id:
          type: string
          description: Location ID
        name:
          type: string
          description: Robot name
        robot_type:
          type: string
          description: Robot type name
        leader_status:
          $ref: "#/components/schemas/LeaderStatus"
          nullable: true
          description: Leader component status (null if robot has no leader component)
        robot_config:
          type: object
          nullable: true
          description: Robot configuration including camera settings (JSON)
      required:
        - organization_id
        - location_id
        - name
    RobotUpdate:
      type: object
      properties:
        robot_id:
          type: string
          description: Robot ID
        organization_id:
          type: string
          description: Organization ID
        location_id:
          type: string
          description: Location ID
        name:
          type: string
          description: Robot name
        robot_type:
          type: string
          description: Robot type name
        status:
          $ref: "#/components/schemas/RobotStatus"
        leader_status:
          $ref: "#/components/schemas/LeaderStatus"
          nullable: true
          description: Leader component status (null if robot has no leader component)
        battery_level:
          type: integer
          description: Battery level (0-100)
        last_heartbeat_at:
          type: string
          format: date-time
          description: Last heartbeat timestamp
        offline_reason:
          type: string
          description: Reason why robot is offline
        robot_config:
          type: object
          nullable: true
          description: Robot configuration including camera settings (JSON)

    # === Task schemas ===
    TaskCategoryType:
      type: object
      properties:
        id:
          type: string
          description: Category type ID
        slug:
          type: string
          description: Category type slug (e.g. basic_skill, application)
        name:
          type: string
          description: Category type display name
      required:
        - id
        - slug
        - name

    TaskTag:
      type: object
      properties:
        id:
          type: string
          description: Tag ID
        name:
          type: string
          description: Tag name
        category_type_id:
          type: string
          description: Category type ID
        category_type_name:
          type: string
          description: Category type display name
      required:
        - id
        - name
        - category_type_id
        - category_type_name

    TaskTagCreate:
      type: object
      properties:
        name:
          type: string
          description: Tag name
        category_type_id:
          type: string
          description: Category type ID
      required:
        - name
        - category_type_id

    Task:
      type: object
      properties:
        id:
          type: string
          description: Task ID
        name:
          type: string
          description: Task name
        description:
          type: string
        version:
          type: string
          description: Current task version
        version_display_name:
          type: string
          description: |
            Resolved display name of the current task version. Falls back to
            "{name} {version}" when the version has no display_name set.
        manual_url:
          type: string
          description: URL for external manual (e.g. TeachMeBiz)
        priority:
          $ref: "#/components/schemas/TaskPriority"
        difficulty:
          $ref: "#/components/schemas/TaskDifficulty"
        status:
          $ref: "#/components/schemas/TaskStatus"
        deadline:
          type: string
          format: date-time
          description: Task completion deadline
        robot_type:
          type: string
          description: Robot type name associated with this task
        target_duration_seconds:
          type: integer
          description: Target data collection duration in seconds (from latest task version)
        target_episode_count:
          type: integer
          description: Target episode count from current task version
        actual_episode_count:
          type: integer
          description: Completed episode count from task version stats
          readOnly: true
        tags:
          type: array
          items:
            $ref: "#/components/schemas/TaskTag"
          description: Task tags
      required:
        - id
        - name
        - manual_url
        - priority
        - difficulty
        - status
        - deadline
    TaskCreate:
      type: object
      properties:
        organization_id:
          type: string
          description: Organization ID
        name:
          type: string
          description: Task name
        description:
          type: string
          description: Task description
        manual_url:
          type: string
          description: URL for external manual (e.g. TeachMeBiz)
        priority:
          $ref: "#/components/schemas/TaskPriority"
        difficulty:
          $ref: "#/components/schemas/TaskDifficulty"
        status:
          $ref: "#/components/schemas/TaskStatus"
        deadline:
          type: string
          format: date-time
          description: Task completion deadline
        robot_type:
          type: string
          description: Robot type name associated with this task
        tag_ids:
          type: array
          items:
            type: string
          description: Tag IDs to assign
      required:
        - organization_id
        - name
        - manual_url
        - priority
        - difficulty
        - status
        - deadline

    TaskUpdate:
      type: object
      properties:
        name:
          type: string
          description: Task name
        description:
          type: string
          description: Task description
        manual_url:
          type: string
          description: URL for external manual (e.g. TeachMeBiz)
        priority:
          $ref: "#/components/schemas/TaskPriority"
        difficulty:
          $ref: "#/components/schemas/TaskDifficulty"
        status:
          $ref: "#/components/schemas/TaskStatus"
        deadline:
          type: string
          format: date-time
          description: Task completion deadline
        robot_type:
          type: string
          description: Robot type name associated with this task
        tag_ids:
          type: array
          items:
            type: string
          description: Tag IDs to assign (replaces existing)

    TaskVersion:
      type: object
      properties:
        id:
          type: string
          description: Task version ID
        task_id:
          type: string
          description: Task ID
        version:
          type: string
          description: Version string (e.g., v1.0.0)
        display_name:
          type: string
          description: Optional human-readable label for this version. Null when unset.
          maxLength: 100
          nullable: true
        is_current:
          type: boolean
          description: Whether this is the current (active) version
        approval_status:
          $ref: "#/components/schemas/ApprovalStatus"
        parameters:
          type: array
          description: |
            Template parameter definitions. Subtask names can use {key} placeholders
            that are resolved per-episode. Example: [{"key": "arm", "values": ["Left", "Right"]}]
          items:
            $ref: "#/components/schemas/TaskVersionParameter"
        created_at:
          type: string
          format: date-time
          description: Created at
        target_duration_seconds:
          type: integer
          description: Target data collection duration in seconds
          minimum: 1
        target_episode_count:
          type: integer
          description: Target number of episodes to collect
          minimum: 1
        target_duration_per_episode_seconds:
          type: integer
          description: Target data collection duration per episode in seconds
          minimum: 1
        actual_duration_seconds:
          type: integer
          description: Actual total collection duration in seconds (from batch aggregation)
          readOnly: true
        actual_episode_count:
          type: integer
          description: Actual number of completed episodes (from batch aggregation)
          readOnly: true
      required:
        - id
        - task_id
        - version
        - is_current
        - approval_status
        - created_at

    TaskVersionCreate:
      type: object
      properties:
        version:
          type: string
          description: New version string (e.g., v2.0.0)
          minLength: 1
          maxLength: 50
        display_name:
          type: string
          description: Optional human-readable label for the new version
          maxLength: 100
        base_task_version_id:
          type: string
          description: Base task version ID to copy subtasks from
          minLength: 1
        target_duration_seconds:
          type: integer
          description: Target data collection duration in seconds
          minimum: 1
        target_episode_count:
          type: integer
          description: Target number of episodes to collect
          minimum: 1
        target_duration_per_episode_seconds:
          type: integer
          description: Target data collection duration per episode in seconds
          minimum: 1
        parameters:
          type: array
          description: |
            Template parameter definitions. Subtask names can use {key} placeholders
            that are resolved per-episode. Example: [{"key": "arm", "values": ["Left", "Right"]}]
          items:
            $ref: "#/components/schemas/TaskVersionParameter"
      required:
        - version
        - base_task_version_id

    TaskVersionUpdate:
      type: object
      properties:
        display_name:
          type: string
          description: |
            Updated display name. Pass an empty string to clear the existing
            value. Omit the property to leave it unchanged.
          maxLength: 100
        target_duration_seconds:
          type: integer
          description: Target data collection duration in seconds
          minimum: 1
        target_episode_count:
          type: integer
          description: Target number of episodes to collect
          minimum: 1
        target_duration_per_episode_seconds:
          type: integer
          description: Target data collection duration per episode in seconds
          minimum: 1

    TaskVersionParametersUpdate:
      type: object
      properties:
        parameters:
          type: array
          description: |
            New parameter definitions replacing existing ones.
            Subtask names can use {key} placeholders resolved per-episode.
          items:
            $ref: "#/components/schemas/TaskVersionParameter"
      required:
        - parameters

    # === Sub-task schemas ===
    SubTask:
      type: object
      properties:
        id:
          type: string
          description: Sub-task ID
        status:
          $ref: "#/components/schemas/SubTaskStatus"
        name:
          type: string
          description: Sub-task name
        description:
          type: string
          description: Sub-task description
        target_duration_seconds:
          type: integer
          description: Target data collection duration in seconds
          minimum: 1
      required:
        - id
        - name
    SubTaskCreate:
      type: object
      properties:
        organization_id:
          type: string
          description: Organization ID
        name:
          type: string
          description: Sub-task name
        description:
          type: string
          description: Sub-task description
        task_id:
          type: string
          description: Task ID
        task_version_id:
          type: string
          description: Task Version ID (must be a draft version)
        target_duration_seconds:
          type: integer
          description: Target data collection duration in seconds
          minimum: 1
      required:
        - organization_id
        - name
        - task_id
        - task_version_id
    SubTaskUpdate:
      type: object
      properties:
        name:
          type: string
          description: Sub-task name
        description:
          type: string
          description: Sub-task description
        is_completed:
          type: boolean
          description: Completion flag
        target_duration_seconds:
          type: integer
          description: Target data collection duration in seconds
          minimum: 1

    SubTaskReorder:
      type: object
      properties:
        task_version_id:
          type: string
          description: Task Version ID (must be a draft version)
        subtask_ids:
          type: array
          description: Ordered list of sub-task IDs. The position in the array determines the new order_index.
          items:
            type: string
      required:
        - task_version_id
        - subtask_ids

    # === Episode schemas ===
    Episode:
      type: object
      properties:
        id:
          type: string
          description: Episode ID (natural UUID)
        user_id:
          type: string
          description: User ID
        location_id:
          type: string
          description: Location ID
        robot_id:
          type: string
          description: Robot ID
        task_id:
          type: string
          description: Task ID
        task_name:
          type: string
          description: Task name
        task_description:
          type: string
          description: Task description
        task_version_id:
          type: string
          description: Task Version ID
        task_version_display_name:
          type: string
          description: |
            Resolved display name of the episode's task version. Server-resolved
            with fallback to "{task_name} {version}" when display_name is unset.
        status:
          $ref: "#/components/schemas/EpisodeCollectionStatus"
        error_details:
          type: string
          description: Error details
        started_at:
          type: string
          format: date-time
          description: Episode start time
        ended_at:
          type: string
          format: date-time
          description: Episode end time
        created_at:
          type: string
          format: date-time
          description: Episode creation time
        recorded_by:
          type: string
          description: ID of the user who recorded this episode
        parameter_values:
          type: object
          additionalProperties:
            type: string
          description: |
            Resolved parameter values for this episode. Keys match the task
            version's parameter definitions. Example: {"arm": "Left"}
        subtasks:
          type: array
          description: List of subtasks with their latest execution status
          items:
            $ref: "#/components/schemas/EpisodeSubTask"
        average_grade:
          type: number
          format: double
          nullable: true
          minimum: 0
          maximum: 1
          description: Average of all grades for this episode (null when there are no grades)
        grade_count:
          type: integer
          minimum: 0
          description: Total number of grades recorded for this episode
      required:
        - id
        - user_id
        - location_id
        - robot_id
        - task_id
        - task_version_id
        - status
        - created_at
    EpisodeGrade:
      type: object
      description: A single grader's rating of an episode
      properties:
        episode_id:
          type: string
          description: Episode ID (natural UUID)
        user_id:
          type: string
          description: ID of the user who made this rating
        user_name:
          type: string
          description: Display name of the user who made this rating
        grade:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Quality score from 0.0 (worst) to 1.0 (best)
        comment:
          type: string
          nullable: true
          maxLength: 10000
          description: Optional free-form note left by the grader
        graded_at:
          type: string
          format: date-time
          description: Timestamp of the most recent grade action (insert or update)
        created_at:
          type: string
          format: date-time
          description: When the grade row was first created
        updated_at:
          type: string
          format: date-time
          description: When the grade row was last modified for any reason
      required:
        - episode_id
        - user_id
        - user_name
        - grade
        - graded_at
        - created_at
    EpisodeGradeUpdate:
      type: object
      description: Payload for creating or updating the current user's grade for an episode
      properties:
        grade:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Quality score from 0.0 to 1.0
        comment:
          type: string
          nullable: true
          maxLength: 10000
          description: Optional free-form note
      required:
        - grade
    EpisodeGradeListResponse:
      type: object
      properties:
        grades:
          type: array
          items:
            $ref: "#/components/schemas/EpisodeGrade"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required:
        - grades
        - pagination
    EpisodeCreate:
      type: object
      properties:
        organization_id:
          type: string
          description: Organization ID
        location_id:
          type: string
          description: Location ID
        robot_id:
          type: string
          description: Robot ID
        task_id:
          type: string
          description: Task ID
        recorded_by:
          type: string
          description: ID of the user who will record this episode
        task_version_id:
          type: string
          description: Task version ID. If not specified, the latest approved version is used.
        parameter_values:
          type: object
          additionalProperties:
            type: string
          description: |
            Resolved parameter values for this episode. Keys must match the task
            version's parameter definitions. If omitted or partially provided,
            missing values are randomly selected from the allowed set.
            Example: {"arm": "Left"}
      required:
        - organization_id
        - location_id
        - robot_id
        - task_id
    EpisodeBulkCreate:
      allOf:
        - $ref: "#/components/schemas/EpisodeCreate"
        - type: object
          properties:
            count:
              type: integer
              minimum: 1
              maximum: 100
              description: Number of episodes to create in one request
          required:
            - count
    EpisodeUpdate:
      type: object
      properties:
        start_time:
          type: string
          format: date-time
          description: Episode start time
        end_time:
          type: string
          format: date-time
          description: Episode end time
        status:
          $ref: "#/components/schemas/EpisodeCollectionStatus"
        error_details:
          type: string
          description: Error details
        recorded_by:
          type: string
          description: ID of the user who recorded this episode
    EpisodeSubTask:
      type: object
      description: Subtask with execution history
      properties:
        id:
          type: string
          description: Episode subtask ID - use this for API path parameters
        subtask_id:
          type: string
          description: Reference to the subtask definition
        name:
          type: string
          description: Subtask name
        order_index:
          type: integer
          description: Execution order (0-indexed)
        status:
          $ref: "#/components/schemas/SubTaskCollectionStatus"
        executions:
          type: array
          description: List of executions for this subtask
          items:
            $ref: "#/components/schemas/EpisodeSubTaskExecution"
      required:
        - id
        - subtask_id
        - name
        - order_index
        - status
    EpisodeSubTaskExecution:
      type: object
      description: Execution record for a subtask
      properties:
        id:
          type: string
          description: Execution ID
        status:
          $ref: '#/components/schemas/ExecutionStatus'
        started_at:
          type: string
          format: date-time
          description: Execution start time
        finished_at:
          type: string
          format: date-time
          description: Execution finish time (null if still running)
      required:
        - id
        - status

    # === Episode Recording schemas ===
    EpisodeRecordingsResponse:
      type: object
      description: Presigned URLs for episode video recordings, keyed by feature name
      required:
        - recordings
      properties:
        recordings:
          type: object
          additionalProperties:
            type: string
          description: Map of feature name to presigned S3 URL (e.g. "observation.image.hand" -> "https://...")
    EpisodeFeatureStats:
      type: object
      description: Statistics for a single feature
      required:
        - min
        - max
        - mean
        - std
        - count
      properties:
        min:
          description: Minimum values (scalar or array per channel/dimension)
        max:
          description: Maximum values (scalar or array per channel/dimension)
        mean:
          description: Mean values (scalar or array per channel/dimension)
        std:
          description: Standard deviation values (scalar or array per channel/dimension)
        count:
          type: integer
          description: Number of frames
    EpisodeStatsResponse:
      type: object
      description: Statistics for all features in the episode
      required:
        - stats
      properties:
        stats:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/EpisodeFeatureStats"
          description: Map of feature name to statistics

    # === Site schemas ===
    Site:
      type: object
      properties:
        id:
          type: string
          description: Site ID
        name:
          type: string
          description: Site name
        organization_id:
          type: string
          description: Organization ID
        created_at:
          type: string
          format: date-time
          description: Created at
        updated_at:
          type: string
          format: date-time
          description: Updated at
      required:
        - id
        - name
        - organization_id
    SiteListResponse:
      type: object
      properties:
        sites:
          type: array
          items:
            $ref: "#/components/schemas/Site"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required:
        - sites
        - pagination
    SiteCreate:
      type: object
      properties:
        organization_id:
          type: string
          description: Organization ID
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: Site name
      required:
        - organization_id
        - name
    SiteUpdate:
      type: object
      properties:
        name:
          type: string
          description: Site name

    # === Location schemas (new) ===
    Location:
      type: object
      properties:
        id:
          type: string
          description: Location ID
        name:
          type: string
          description: Location name
        site_id:
          type: string
          description: Site ID
        site_name:
          type: string
          description: Site name
      required:
        - id
        - name
        - site_id
        - site_name
    LocationCreate:
      type: object
      properties:
        name:
          type: string
          description: Location name
        organization_id:
          type: string
          description: Organization id
        site_id:
          type: string
          description: Site ID
      required:
        - name
        - organization_id
        - site_id
    LocationUpdate:
      type: object
      properties:
        name:
          type: string
          description: Location name

    RobotStatusUpdateRequest:
      type: object
      properties:
        robot_type:
          type: string
          description: Type of the robot (e.g., HSR)
        reported_at:
          type: string
          format: date-time
          description: Timestamp when the status was reported
        status:
          $ref: "#/components/schemas/RobotStatusDetail"
      required:
        - robot_type
        - reported_at
        - status

    RobotStatusDetail:
      type: object
      properties:
        battery:
          $ref: "#/components/schemas/BatteryStatus"
        connection:
          $ref: "#/components/schemas/ConnectionStatus"
        uptime_sec:
          type: number
          format: double
          description: Robot uptime in seconds
        metrics:
          type: array
          description: List of robot metrics
          items:
            $ref: "#/components/schemas/RobotMetric"
        gate_conditions:
          $ref: "#/components/schemas/GateConditionStatus"
      required:
        - battery
        - connection
        - uptime_sec

    BatteryStatus:
      type: object
      properties:
        pct:
          type: integer
          description: Battery percentage (0-100)
        charging:
          type: boolean
          description: Whether the battery is currently charging
      required:
        - pct
        - charging

    ConnectionStatus:
      type: object
      properties:
        quality_pct:
          type: integer
          description: Connection quality percentage (0-100)
      required:
        - quality_pct

    RobotMetric:
      type: object
      properties:
        name:
          type: string
          description: Metric name
        type:
          type: string
          description: Metric type (scalar, vector, map, array)
          enum:
            - scalar
            - vector
            - map
            - array
        unit:
          type: string
          description: Unit of measurement
        value:
          description: Metric value (type depends on the metric type)
        labels:
          type: object
          description: Optional labels for the metric
          additionalProperties:
            type: string
      required:
        - name
        - type
        - unit
        - value

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          description: HTTP status code
        message:
          type: string
          description: Error message
      required:
        - code
        - message

    RobotStatusStreamResponse:
      type: object
      description: |
        SSE response for robot status stream.
        This is a simplified, flattened version of RobotStatusUpdateRequest
        designed for efficient real-time streaming to clients via Server-Sent Events.
      properties:
        robot_id:
          type: string
          description: ID of robot
        robot_type:
          type: string
          description: Type of the robot
        status:
          $ref: "#/components/schemas/RobotStatusStreamDetail"
      required:
        - robot_id
        - robot_type
        - status

    RobotStatusStreamDetail:
      type: object
      description: |
        Simplified robot status for SSE streaming.
        This is a flattened version of RobotStatusDetail, extracting only
        the essential metrics (battery percentage from Battery.pct,
        connection quality from Connection.quality_pct, and uptime).
        Metrics array is omitted for bandwidth efficiency.
      properties:
        battery_pct:
          type: integer
          description: Battery percentage (0-100), extracted from RobotStatusDetail.battery.pct
        connection_pct:
          type: integer
          description: Connection quality percentage (0-100), extracted from RobotStatusDetail.connection.quality_pct
        uptime_sec:
          type: integer
          description: Robot uptime in seconds
        gate_conditions:
          $ref: "#/components/schemas/GateConditionStatus"
      required:
        - battery_pct
        - connection_pct
        - uptime_sec

    # === Robot Operator Schemas ===

    RobotOperator:
      type: object
      description: Active operator identity for a robot
      properties:
        user_id:
          type: string
          description: User ID of the operator
        display_name:
          type: string
          description: Display name of the operator
        organization_name:
          type: string
          description: Organization name of the operator
      required:
        - user_id
        - display_name
        - organization_name

    RobotOperatorRequest:
      type: object
      description: Request body for setting robot operator
      properties:
        user_id:
          type: string
        display_name:
          type: string
        organization_name:
          type: string
      required:
        - user_id
        - display_name
        - organization_name

    # === Gate Condition Schemas ===

    GateConditionStatus:
      type: object
      description: Recording gate status with full group/condition hierarchy
      properties:
        gate_level:
          type: integer
          description: Overall gate level (0=open, 1=block start, 2=hard stop)
        groups:
          type: object
          description: Gate groups keyed by group name
          additionalProperties:
            $ref: "#/components/schemas/GateGroupStatus"
      required:
        - gate_level
        - groups

    GateGroupStatus:
      type: object
      description: Status of a single gate group
      properties:
        level:
          type: integer
          description: Group escalation level
        settled:
          type: boolean
          description: Whether the group has settled
        conditions:
          type: array
          items:
            $ref: "#/components/schemas/GateCondition"
      required:
        - level
        - settled
        - conditions

    GateCondition:
      type: object
      description: Status of a single gate condition within a group
      properties:
        name:
          type: string
          description: Condition name
        passed:
          type: boolean
          description: Whether the condition is currently passing
        reason:
          type: string
          description: Human-readable reason (e.g. "ok", "timeout (2.1s > 1.0s)")
        escalation:
          type: integer
          description: Escalation level if failing (0=ok, 1=block, 2=hard stop)
      required:
        - name
        - passed
        - reason
        - escalation

    # === Fleet Schemas ===
    FleetSiteSummary:
      type: object
      description: Fleet summary for a single site
      properties:
        site:
          type: string
          description: Site name
        site_id:
          type: string
          description: Site ID
        robot_types:
          type: object
          description: Robot type summaries keyed by robot type name
          additionalProperties:
            $ref: "#/components/schemas/FleetRobotTypeSummary"
      required:
        - site
        - site_id
        - robot_types

    FleetRobotTypeSummary:
      type: object
      description: Leader/follower status counts for a robot type
      properties:
        leader:
          $ref: "#/components/schemas/FleetStatusCount"
          nullable: true
          description: Leader component status (null if no robots have leader component)
        follower:
          $ref: "#/components/schemas/FleetStatusCount"
          description: Follower (robot body) status
      required:
        - follower

    FleetStatusCount:
      type: object
      description: Operational and total count
      properties:
        operational:
          type: integer
          description: Number of operational units
        total:
          type: integer
          description: Total number of units
      required:
        - operational
        - total

    FleetSiteStats:
      type: object
      description: Collection time statistics for a single site
      properties:
        site:
          type: string
          description: Site name
        site_id:
          type: string
          description: Site ID
        robot_types:
          type: array
          items:
            $ref: "#/components/schemas/FleetRobotTypeStats"
      required:
        - site
        - site_id
        - robot_types

    FleetRobotTypeStats:
      type: object
      description: Collection time and uptime stats for a robot type
      properties:
        robot_type:
          type: string
          description: Robot type name
        robot_uptime:
          type: number
          nullable: true
          description: Robot uptime in hours
        uptime_rate:
          type: number
          nullable: true
          minimum: 0
          maximum: 1
          description: Robot uptime rate (0.0–1.0) relative to total possible uptime in the period
        robot_count:
          type: integer
          nullable: true
          description: Number of distinct robots with uptime data in the period
        data_collection_time:
          type: number
          description: Data collection time in hours
      required:
        - robot_type
        - data_collection_time

    CollectionTrend:
      type: object
      description: Time series collection trend data
      properties:
        labels:
          type: array
          items:
            type: string
          description: Time axis labels (ISO 8601 format)
        by_site:
          type: array
          items:
            $ref: "#/components/schemas/TrendSeries"
        by_robot_type:
          type: array
          items:
            $ref: "#/components/schemas/TrendSeries"
      required:
        - labels
        - by_site
        - by_robot_type

    TrendSeries:
      type: object
      description: A single data series for the trend chart
      properties:
        label:
          type: string
          description: Series label (site name or robot type name)
        data:
          type: array
          items:
            type: number
          description: Data points corresponding to labels (hours)
      required:
        - label
        - data

    TaskVersionParameter:
      type: object
      description: |
        Defines a template parameter for subtask names. Subtask names can
        reference parameters using {key} syntax (e.g. "Pick with {arm} arm").
        When an episode is created, each parameter is resolved to one of
        its allowed values.
      properties:
        key:
          type: string
          description: Parameter key used in subtask name templates as {key}
          minLength: 1
        values:
          type: array
          items:
            type: string
            minLength: 1
          minItems: 1
          description: List of allowed values for this parameter
      required:
        - key
        - values

    TaskSummaryResponse:
      type: object
      description: Aggregated task summary
      properties:
        total_tasks:
          type: integer
          description: Total number of tasks matching the filter
        target_duration_seconds:
          type: integer
          format: int64
          description: Sum of target duration across all approved task versions
        target_episode_count:
          type: integer
          description: Sum of target episode count across all approved task versions
      required:
        - total_tasks
        - target_duration_seconds
        - target_episode_count

    TaskCompletionTrend:
      type: object
      description: Task completion trend grouped by 2-week deadline periods
      properties:
        periods:
          type: array
          items:
            $ref: "#/components/schemas/TaskTrendPeriod"
          description: Trend data for each 2-week period
      required:
        - periods

    TaskTrendPeriod:
      type: object
      description: Trend data for a single period
      properties:
        start:
          type: string
          format: date-time
          description: Period start date (inclusive)
        end:
          type: string
          format: date-time
          description: Period end date (exclusive)
        groups:
          type: array
          items:
            $ref: "#/components/schemas/TaskTrendGroup"
          description: Breakdown by category or status
      required:
        - groups

    TaskTrendGroup:
      type: object
      description: A single group within a trend period
      properties:
        label:
          type: string
          description: Group label (tag name or status name)
        target_tasks:
          type: integer
          description: Number of tasks in this group
        actual_tasks:
          type: integer
          description: Number of completed tasks in this group
        target_duration:
          type: integer
          format: int64
          description: Sum of target duration (seconds)
        actual_duration:
          type: integer
          format: int64
          description: Sum of actual collected duration (seconds)
        target_episodes:
          type: integer
          description: Sum of target episode count
        actual_episodes:
          type: integer
          description: Sum of actual collected episode count
      required:
        - label
        - target_tasks
        - actual_tasks
        - target_duration
        - actual_duration
        - target_episodes
        - actual_episodes

    UserImportRequest:
      type: object
      description: Request body for CSV user import
      properties:
        csv_content:
          type: string
          description: CSV content as a string (UTF-8, with or without BOM)
      required:
        - csv_content

    UserImportValidationResponse:
      type: object
      description: Validation result for CSV user import
      properties:
        valid_rows:
          type: array
          items:
            $ref: "#/components/schemas/UserImportValidRow"
          description: Rows that passed validation
        duplicate_rows:
          type: array
          items:
            $ref: "#/components/schemas/UserImportRowError"
          description: Rows with duplicate emails (will be skipped)
        error_rows:
          type: array
          items:
            $ref: "#/components/schemas/UserImportRowError"
          description: Rows with validation errors
        summary:
          $ref: "#/components/schemas/UserImportSummary"
      required:
        - valid_rows
        - duplicate_rows
        - error_rows
        - summary

    UserImportValidRow:
      type: object
      description: A single valid row from CSV user import
      properties:
        row_number:
          type: integer
          description: 1-based row number in the CSV (excluding header)
        email:
          type: string
        display_name:
          type: string
        role:
          type: string
      required:
        - row_number
        - email
        - display_name
        - role

    UserImportRowError:
      type: object
      description: A row with errors from CSV user import
      properties:
        row_number:
          type: integer
          description: 1-based row number in the CSV (excluding header)
        email:
          type: string
          description: Email address (if available)
        errors:
          type: array
          items:
            type: string
          description: List of error messages for this row
      required:
        - row_number
        - errors

    UserImportSummary:
      type: object
      description: Summary counts for user import validation
      properties:
        valid_count:
          type: integer
        duplicate_count:
          type: integer
        error_count:
          type: integer
      required:
        - valid_count
        - duplicate_count
        - error_count

    UserImportResponse:
      type: object
      description: Result of user import execution
      properties:
        imported_count:
          type: integer
          description: Number of users successfully imported
        skipped_count:
          type: integer
          description: Number of duplicate users skipped
        error_count:
          type: integer
          description: Number of rows that failed
        errors:
          type: array
          items:
            $ref: "#/components/schemas/UserImportRowError"
          description: Details of rows that failed
      required:
        - imported_count
        - skipped_count
        - error_count
        - errors

    TaskImportRequest:
      type: object
      description: Request body for CSV task import
      properties:
        csv_content:
          type: string
          description: CSV content as a string (UTF-8, with or without BOM)
      required:
        - csv_content

    TaskImportValidationResponse:
      type: object
      description: Validation result for CSV task import
      properties:
        valid_rows:
          type: array
          items:
            $ref: "#/components/schemas/TaskImportRow"
          description: Rows that passed validation
        duplicate_rows:
          type: array
          items:
            $ref: "#/components/schemas/TaskImportRowError"
          description: Rows with duplicate task names (will be skipped)
        error_rows:
          type: array
          items:
            $ref: "#/components/schemas/TaskImportRowError"
          description: Rows with validation errors
        summary:
          $ref: "#/components/schemas/TaskImportSummary"
      required:
        - valid_rows
        - duplicate_rows
        - error_rows
        - summary

    TaskImportRow:
      type: object
      description: A single valid row from CSV import
      properties:
        row_number:
          type: integer
          description: 1-based row number in the CSV (excluding header)
        name:
          type: string
        description:
          type: string
        manual_url:
          type: string
        priority:
          type: string
        difficulty:
          type: string
        status:
          type: string
        deadline:
          type: string
        robot_type:
          type: string
        tags:
          type: string
      required:
        - row_number
        - name
        - manual_url
        - priority
        - difficulty
        - deadline

    TaskImportRowError:
      type: object
      description: A row with errors from CSV import
      properties:
        row_number:
          type: integer
          description: 1-based row number in the CSV (excluding header)
        errors:
          type: array
          items:
            type: string
          description: List of error messages for this row
        name:
          type: string
          description: Task name (if available)
      required:
        - row_number
        - errors

    TaskImportSummary:
      type: object
      description: Summary counts for import validation
      properties:
        valid_count:
          type: integer
        duplicate_count:
          type: integer
        error_count:
          type: integer
      required:
        - valid_count
        - duplicate_count
        - error_count

    TaskImportResponse:
      type: object
      description: Result of task import execution
      properties:
        imported_count:
          type: integer
          description: Number of tasks successfully imported
        skipped_count:
          type: integer
          description: Number of duplicate tasks skipped
        error_count:
          type: integer
          description: Number of rows with errors
        errors:
          type: array
          items:
            $ref: "#/components/schemas/TaskImportRowError"
          description: Details of rows that failed
      required:
        - imported_count
        - skipped_count
        - error_count
        - errors
